name: Release

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0 的标签时自动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许向仓库写入 Release

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置版本环境变量
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "TAG_NAME=v${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: 打包 ArmorVariantManager 目录
        run: |
          cd ArmorVariantManager
          zip -r ../ArmorVariantManager-v${{ env.VERSION }}.zip .
          cd ..

      - name: 创建并发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ArmorVariantManager v${{ env.VERSION }}
          files: ArmorVariantManager-v${{ env.VERSION }}.zip
          generate_release_notes: true # 自动生成 release notes
